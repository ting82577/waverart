        let currentQuestion = 0;
        let answers = [];
        
        function startQuiz() {
            currentQuestion = 0;
            answers = [];
            renderQuestion();
            showPage('quiz-page');
        }
        
        function renderQuestion() {
            const quizContent = document.getElementById('quiz-content');
            const q = questions[currentQuestion];
            
            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('progress-fill').style.width = ((currentQuestion + 1) / 8 * 100) + '%';
            
            quizContent.innerHTML = `
                <div class="question-container active">
                    <div class="question-text">${q.q}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption('${opt.type}', this)">
                                <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                                ${opt.text}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function selectOption(type, el) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            answers[currentQuestion] = type;
            setTimeout(() => {
                if (currentQuestion < 7) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 400);
        }
        
        function showResult() {
            const counts = { A: 0, B: 0, C: 0, D: 0 };
            answers.forEach(a => counts[a]++);
            
            let maxType = 'A';
            let maxCount = counts['A'];
            
            for (let type in counts) {
                if (counts[type] > maxCount) {
                    maxCount = counts[type];
                    maxType = type;
                }
            }
            
            if (counts[maxType] === counts[answers[3]] && maxType !== answers[3]) {
                maxType = answers[3];
            }
            
            const result = results[maxType];
            
            document.getElementById('result-title').textContent = result.name;
            document.getElementById('result-type').innerHTML = `
                <span class="dot" style="background: ${result.color}"></span>
                ${result.type}
            `;
            document.getElementById('result-image').src = result.image;
            document.getElementById('result-desc').textContent = result.desc;
            document.getElementById('result-ingredients').textContent = result.ingredients;
            document.getElementById('result-effects').textContent = result.effects;
            document.getElementById('result-slogan').textContent = '→ ' + result.slogan;
            
            document.getElementById('share-color').style.background = result.color;
            document.getElementById('share-type').textContent = result.name;
            document.getElementById('share-label').textContent = result.type;
            document.getElementById('share-slogan').textContent = '→ ' + result.slogan;
            
            showPage('result-page');
        }
        
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        function restartQuiz() {
            startQuiz();
        }
        
        function scrollToWechat() {
            document.getElementById('bottom-guide').scrollIntoView({ 
                behavior: 'smooth',
                block: 'start'
            });
        }
        
        function copyLink() {
            const url = 'https://waverart.cn';
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    showToast('链接已复制');
                });
            } else {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('链接已复制');
            }
        }
        
        async function saveShareCard() {
            showToast('正在生成图片...');
            const shareCard = document.getElementById('share-card');
            try {
                const canvas = await html2canvas(shareCard, {
                    scale: 2,
                    backgroundColor: '#F5F0EB',
                    useCORS: true,
                    allowTaint: true
                });
                const link = document.createElement('a');
                link.download = '我的灵魂香-未拂.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('图片已保存');
            } catch (e) {
                console.error(e);
                showToast('生成失败，请重试');
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
